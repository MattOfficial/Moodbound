name: Backend Quality

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'scripts/test-backend*.ps1'
      - '.coveragerc'
      - '.github/workflows/backend-quality.yml'
      - '.pre-commit-config.yaml'
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - 'scripts/test-backend*.ps1'
      - '.coveragerc'
      - '.github/workflows/backend-quality.yml'
      - '.pre-commit-config.yaml'

jobs:
  backend-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r backend/requirements.txt

      - name: Run backend coverage
        run: python -m pytest --cov=backend/app --cov-config=.coveragerc --cov-report=term-missing --cov-report=html:backend/coverage backend/tests -q

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: backend/coverage
