<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Novel — Knowledge Graph Explorer</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #060610;
            --text: rgba(255, 255, 255, .92);
            --text-dim: rgba(255, 255, 255, .4);
            --surface: rgba(255, 255, 255, .03);
            --border: rgba(255, 255, 255, .06);
            --violet: #8b5cf6;
            --rose: #f43f5e;
            --cyan: #06b6d4;
            --emerald: #10b981;
            --amber: #f59e0b;
            --blue: #3b82f6;
            --pink: #ec4899;
        }

        html,
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* ── CANVAS ────────────────────────────── */
        canvas#graph {
            position: fixed;
            inset: 0;
            z-index: 0
        }

        /* ── TOP BAR ──────────────────────────── */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            padding: .75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(6, 6, 16, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .topbar .logo {
            font-weight: 700;
            font-size: 1rem
        }

        .topbar .logo span {
            background: linear-gradient(135deg, var(--violet), var(--rose));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .topbar .sep {
            width: 1px;
            height: 20px;
            background: var(--border)
        }

        .topbar .page-title {
            font-size: .875rem;
            color: var(--text-dim);
            font-weight: 500
        }

        .topbar .spacer {
            flex: 1
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .45rem .85rem;
            border-radius: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            min-width: 240px;
            transition: border-color .3s;
        }

        .search-bar:focus-within {
            border-color: rgba(139, 92, 246, .3)
        }

        .search-bar svg {
            width: 14px;
            height: 14px;
            stroke: var(--text-dim);
            flex-shrink: 0
        }

        .search-bar input {
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-size: .8rem;
            font-family: inherit;
            width: 100%;
        }

        .search-bar input::placeholder {
            color: var(--text-dim)
        }

        .filter-pills {
            display: flex;
            gap: .4rem;
            margin-left: .5rem
        }

        .fpill {
            padding: .3rem .7rem;
            border-radius: 8px;
            font-size: .7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            border: 1px solid transparent;
            user-select: none;
        }

        .fpill.active {
            border-color: currentColor
        }

        .fpill.ally {
            color: var(--emerald);
            background: rgba(16, 185, 129, .08)
        }

        .fpill.ally.active {
            background: rgba(16, 185, 129, .2)
        }

        .fpill.rival {
            color: var(--rose);
            background: rgba(244, 63, 94, .08)
        }

        .fpill.rival.active {
            background: rgba(244, 63, 94, .2)
        }

        .fpill.love {
            color: var(--pink);
            background: rgba(236, 72, 153, .08)
        }

        .fpill.love.active {
            background: rgba(236, 72, 153, .2)
        }

        .fpill.family {
            color: var(--amber);
            background: rgba(245, 158, 11, .08)
        }

        .fpill.family.active {
            background: rgba(245, 158, 11, .2)
        }

        .fpill.mystery {
            color: var(--violet);
            background: rgba(139, 92, 246, .08)
        }

        .fpill.mystery.active {
            background: rgba(139, 92, 246, .2)
        }

        /* ── DETAIL PANEL ─────────────────────── */
        .detail-panel {
            position: fixed;
            right: -420px;
            top: 0;
            bottom: 0;
            width: 400px;
            z-index: 60;
            background: rgba(6, 6, 16, .92);
            backdrop-filter: blur(30px);
            border-left: 1px solid var(--border);
            padding: 4.5rem 1.5rem 1.5rem;
            overflow-y: auto;
            transition: right .4s cubic-bezier(.4, 0, .2, 1);
        }

        .detail-panel.open {
            right: 0
        }

        .detail-close {
            position: absolute;
            top: .85rem;
            right: 1rem;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: all .2s;
        }

        .detail-close:hover {
            background: rgba(244, 63, 94, .1);
            border-color: rgba(244, 63, 94, .2)
        }

        .detail-close svg {
            width: 14px;
            height: 14px;
            stroke: var(--text-dim)
        }

        .detail-avatar {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            display: grid;
            place-items: center;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 1.25rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, .3);
        }

        .detail-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: .25rem
        }

        .detail-role {
            color: var(--text-dim);
            font-size: .85rem;
            margin-bottom: 1.5rem
        }

        .detail-section {
            margin-bottom: 1.5rem
        }

        .detail-section h3 {
            font-size: .7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .12em;
            color: var(--text-dim);
            margin-bottom: .75rem;
        }

        .detail-desc {
            font-size: .9rem;
            line-height: 1.7;
            color: rgba(255, 255, 255, .7)
        }

        .rel-list {
            display: flex;
            flex-direction: column;
            gap: .5rem
        }

        .rel-item {
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: .6rem .85rem;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            font-size: .85rem;
            cursor: pointer;
            transition: all .2s;
        }

        .rel-item:hover {
            background: rgba(255, 255, 255, .06);
            transform: translateX(4px)
        }

        .rel-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0
        }

        .rel-name {
            font-weight: 600;
            flex: 1
        }

        .rel-type {
            font-size: .75rem;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace
        }

        /* ── LEGEND ───────────────────────────── */
        .legend {
            position: fixed;
            bottom: 1rem;
            left: 1rem;
            z-index: 50;
            padding: .85rem 1.1rem;
            border-radius: 14px;
            background: rgba(6, 6, 16, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            font-size: .75rem;
            align-items: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: .4rem;
            color: var(--text-dim)
        }

        .legend-line {
            width: 24px;
            height: 3px;
            border-radius: 2px
        }

        /* ── MINIMAP ──────────────────────────── */
        .minimap {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            z-index: 50;
            width: 160px;
            height: 120px;
            border-radius: 12px;
            background: rgba(6, 6, 16, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .minimap canvas {
            width: 100%;
            height: 100%
        }

        /* ── TOOLTIP ──────────────────────────── */
        .tooltip {
            position: fixed;
            z-index: 80;
            padding: .5rem .85rem;
            border-radius: 10px;
            background: rgba(6, 6, 16, .95);
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            font-size: .8rem;
            font-weight: 600;
            pointer-events: none;
            opacity: 0;
            transition: opacity .15s;
            transform: translate(-50%, -120%);
            white-space: nowrap;
        }

        .tooltip.visible {
            opacity: 1
        }

        .tooltip .tt-role {
            font-size: .7rem;
            color: var(--text-dim);
            font-weight: 400;
            margin-top: .15rem
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="logo"><span>Vibe</span> Novel</div>
        <div class="sep"></div>
        <div class="page-title">Knowledge Graph — The Great Gatsby</div>
        <div class="spacer"></div>
        <div class="search-bar">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <path d="M21 21l-4.35-4.35" />
            </svg>
            <input type="text" placeholder="Search characters..." id="searchInput">
        </div>
        <div class="filter-pills">
            <div class="fpill ally active" data-type="ally">Alliance</div>
            <div class="fpill rival active" data-type="rival">Rivalry</div>
            <div class="fpill love active" data-type="love">Romance</div>
            <div class="fpill family active" data-type="family">Family</div>
            <div class="fpill mystery active" data-type="mystery">Mystery</div>
        </div>
    </div>

    <canvas id="graph"></canvas>

    <div class="detail-panel" id="detailPanel">
        <div class="detail-close" id="detailClose">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
        </div>
        <div class="detail-avatar" id="detailAvatar"></div>
        <div class="detail-name" id="detailName"></div>
        <div class="detail-role" id="detailRole"></div>
        <div class="detail-section">
            <h3>Description</h3>
            <div class="detail-desc" id="detailDesc"></div>
        </div>
        <div class="detail-section">
            <h3>Relationships</h3>
            <div class="rel-list" id="detailRels"></div>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="legend-line" style="background:var(--emerald)"></span>Alliance</div>
        <div class="legend-item"><span class="legend-line" style="background:var(--rose)"></span>Rivalry</div>
        <div class="legend-item"><span class="legend-line" style="background:var(--pink)"></span>Romance</div>
        <div class="legend-item"><span class="legend-line" style="background:var(--amber)"></span>Family</div>
        <div class="legend-item"><span class="legend-line" style="background:var(--violet)"></span>Mystery</div>
    </div>

    <div class="tooltip" id="tooltip">
        <div class="tt-name" id="ttName"></div>
        <div class="tt-role" id="ttRole"></div>
    </div>

    <div class="minimap"><canvas id="minimapCanvas" width="160" height="120"></canvas></div>

    <script>
        /* =====================================================================
           KNOWLEDGE GRAPH — INTERACTIVE PHYSICS SIMULATION
           ===================================================================== */

        const canvas = document.getElementById('graph');
        const ctx = canvas.getContext('2d');
        const mmCanvas = document.getElementById('minimapCanvas');
        const mmCtx = mmCanvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        const panel = document.getElementById('detailPanel');

        let W, H, dpr;
        function resize() {
            dpr = devicePixelRatio || 1;
            W = innerWidth; H = innerHeight;
            canvas.width = W * dpr; canvas.height = H * dpr;
            canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resize(); addEventListener('resize', resize);

        /* ── DATA ──────────────────────────────── */
        const typeColors = {
            ally: '#10b981', rival: '#f43f5e', love: '#ec4899', family: '#f59e0b', mystery: '#8b5cf6'
        };

        const characters = [
            { id: 'gatsby', name: 'Jay Gatsby', role: 'The Dreamer', color: '#8b5cf6', desc: 'A mysterious millionaire known for extravagant parties, driven by his undying love for Daisy Buchanan.' },
            { id: 'daisy', name: 'Daisy Buchanan', role: 'The Golden Girl', color: '#ec4899', desc: 'Beautiful and charming, yet careless. Torn between old money comfort and Gatsby\'s passionate devotion.' },
            { id: 'tom', name: 'Tom Buchanan', role: 'The Aristocrat', color: '#f43f5e', desc: 'Old money, brutish strength, and casual cruelty. He represents the established elite.' },
            { id: 'nick', name: 'Nick Carraway', role: 'The Observer', color: '#06b6d4', desc: 'The narrator and moral compass, drawn into the world of wealth and watching it crumble.' },
            { id: 'jordan', name: 'Jordan Baker', role: 'The Athlete', color: '#10b981', desc: 'Cool, cynical, and dishonest — a professional golfer who embodies the era\'s careless attitude.' },
            { id: 'myrtle', name: 'Myrtle Wilson', role: 'The Dreamer\'s Shadow', color: '#f59e0b', desc: 'Tom\'s mistress, desperately seeking escape from her grey existence in the Valley of Ashes.' },
            { id: 'george', name: 'George Wilson', role: 'The Ghost', color: '#64748b', desc: 'A washed-out mechanic, haunted and broken, who becomes the instrument of tragedy.' },
            { id: 'wolfsheim', name: 'Meyer Wolfsheim', role: 'The Fixer', color: '#a855f7', desc: 'Gatsby\'s underworld connection, hinting at the dark foundations of his wealth.' },
            { id: 'owl', name: 'Owl Eyes', role: 'The Witness', color: '#22d3ee', desc: 'A spectacled eccentric who sees through the illusion — one of few genuine mourners at Gatsby\'s funeral.' },
        ];

        const edges = [
            { from: 'gatsby', to: 'daisy', type: 'love', label: 'Obsessive love' },
            { from: 'tom', to: 'daisy', type: 'family', label: 'Married' },
            { from: 'tom', to: 'myrtle', type: 'love', label: 'Affair' },
            { from: 'george', to: 'myrtle', type: 'family', label: 'Married' },
            { from: 'nick', to: 'gatsby', type: 'ally', label: 'Confidant' },
            { from: 'nick', to: 'daisy', type: 'family', label: 'Cousins' },
            { from: 'nick', to: 'jordan', type: 'love', label: 'Romantic interest' },
            { from: 'gatsby', to: 'tom', type: 'rival', label: 'Love rival' },
            { from: 'gatsby', to: 'wolfsheim', type: 'mystery', label: 'Business partner' },
            { from: 'george', to: 'gatsby', type: 'rival', label: 'Tragic nemesis' },
            { from: 'tom', to: 'gatsby', type: 'rival', label: 'Class contempt' },
            { from: 'owl', to: 'gatsby', type: 'mystery', label: 'Observes' },
            { from: 'nick', to: 'tom', type: 'rival', label: 'Moral opposition' },
        ];

        /* ── PHYSICS NODES ─────────────────────── */
        const nodes = characters.map((c, i) => {
            const angle = (i / characters.length) * Math.PI * 2;
            const r = 200 + Math.random() * 100;
            return {
                ...c,
                x: W / 2 + Math.cos(angle) * r,
                y: H / 2 + Math.sin(angle) * r,
                vx: 0, vy: 0,
                radius: c.id === 'gatsby' ? 32 : c.id === 'daisy' || c.id === 'tom' || c.id === 'nick' ? 26 : 20,
                mass: c.id === 'gatsby' ? 3 : c.id === 'daisy' || c.id === 'tom' || c.id === 'nick' ? 2 : 1,
                pulsePhase: Math.random() * Math.PI * 2,
            };
        });

        const nodeMap = {};
        nodes.forEach(n => nodeMap[n.id] = n);

        /* ── ACTIVE FILTERS ──────────────────── */
        const activeFilters = new Set(['ally', 'rival', 'love', 'family', 'mystery']);
        document.querySelectorAll('.fpill').forEach(pill => {
            pill.addEventListener('click', () => {
                const t = pill.dataset.type;
                pill.classList.toggle('active');
                if (activeFilters.has(t)) activeFilters.delete(t); else activeFilters.add(t);
            });
        });

        /* ── PHYSICS ──────────────────────────── */
        const SPRING_LENGTH = 220;
        const SPRING_K = 0.003;
        const REPULSION = 18000;
        const DAMPING = 0.88;
        const CENTER_GRAVITY = 0.0002;

        function simulate() {
            // Repulsion
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    let dx = nodes[j].x - nodes[i].x;
                    let dy = nodes[j].y - nodes[i].y;
                    let dist = Math.sqrt(dx * dx + dy * dy) || 1;
                    let force = REPULSION / (dist * dist);
                    let fx = (dx / dist) * force;
                    let fy = (dy / dist) * force;
                    nodes[i].vx -= fx / nodes[i].mass;
                    nodes[i].vy -= fy / nodes[i].mass;
                    nodes[j].vx += fx / nodes[j].mass;
                    nodes[j].vy += fy / nodes[j].mass;
                }
            }

            // Springs (edges)
            edges.forEach(e => {
                if (!activeFilters.has(e.type)) return;
                const a = nodeMap[e.from], b = nodeMap[e.to];
                let dx = b.x - a.x, dy = b.y - a.y;
                let dist = Math.sqrt(dx * dx + dy * dy) || 1;
                let force = (dist - SPRING_LENGTH) * SPRING_K;
                let fx = (dx / dist) * force;
                let fy = (dy / dist) * force;
                a.vx += fx; a.vy += fy;
                b.vx -= fx; b.vy -= fy;
            });

            // Center gravity
            nodes.forEach(n => {
                n.vx += (W / 2 - n.x) * CENTER_GRAVITY;
                n.vy += (H / 2 - n.y) * CENTER_GRAVITY;
            });

            // Integrate
            nodes.forEach(n => {
                if (n.dragging) return;
                n.vx *= DAMPING; n.vy *= DAMPING;
                n.x += n.vx; n.y += n.vy;
                // Bounds
                n.x = Math.max(n.radius, Math.min(W - n.radius, n.x));
                n.y = Math.max(n.radius + 60, Math.min(H - n.radius, n.y));
            });
        }

        /* ── DRAWING ──────────────────────────── */
        let time = 0;
        let hoveredNode = null;
        let selectedNode = null;

        function draw() {
            time += 0.016;
            simulate();

            ctx.clearRect(0, 0, W, H);

            // Draw grid dots
            const gridSpacing = 60;
            ctx.fillStyle = 'rgba(255,255,255,0.015)';
            for (let x = gridSpacing; x < W; x += gridSpacing) {
                for (let y = gridSpacing; y < H; y += gridSpacing) {
                    ctx.beginPath();
                    ctx.arc(x, y, 1, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Draw edges
            edges.forEach(e => {
                if (!activeFilters.has(e.type)) return;
                const a = nodeMap[e.from], b = nodeMap[e.to];
                const color = typeColors[e.type];
                const isHighlighted = hoveredNode && (hoveredNode.id === e.from || hoveredNode.id === e.to);
                const baseAlpha = isHighlighted ? 0.7 : (hoveredNode ? 0.08 : 0.25);

                // Animated dash / glow
                ctx.save();
                ctx.strokeStyle = color;
                ctx.globalAlpha = baseAlpha;
                ctx.lineWidth = isHighlighted ? 2.5 : 1.5;

                // Flowing dash animation
                ctx.setLineDash([6, 8]);
                ctx.lineDashOffset = -time * 30;

                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                ctx.stroke();

                // Edge glow
                if (isHighlighted) {
                    ctx.globalAlpha = 0.1;
                    ctx.lineWidth = 8;
                    ctx.setLineDash([]);
                    ctx.shadowColor = color;
                    ctx.shadowBlur = 15;
                    ctx.stroke();
                }

                // Edge label
                if (isHighlighted) {
                    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
                    ctx.globalAlpha = 0.85;
                    ctx.font = '500 11px Inter';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = color;
                    ctx.shadowBlur = 0;

                    // Background for label
                    const tw = ctx.measureText(e.label).width + 16;
                    ctx.fillStyle = 'rgba(6,6,16,0.85)';
                    ctx.beginPath();
                    ctx.roundRect(mx - tw / 2, my - 11, tw, 22, 6);
                    ctx.fill();
                    ctx.fillStyle = color;
                    ctx.fillText(e.label, mx, my + 1);
                }

                ctx.restore();
            });

            // Draw nodes
            nodes.forEach(n => {
                n.pulsePhase += 0.03;
                const isHovered = hoveredNode === n;
                const isSelected = selectedNode === n;
                const isDimmed = hoveredNode && hoveredNode !== n && !isConnected(hoveredNode, n);
                const pulse = 1 + Math.sin(n.pulsePhase) * 0.04;
                const r = n.radius * pulse;

                ctx.save();
                ctx.globalAlpha = isDimmed ? 0.2 : 1;

                // Outer glow
                if (isHovered || isSelected) {
                    const grad = ctx.createRadialGradient(n.x, n.y, r, n.x, n.y, r * 2.5);
                    grad.addColorStop(0, n.color + '30');
                    grad.addColorStop(1, 'transparent');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, r * 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Node body
                const bodyGrad = ctx.createRadialGradient(n.x - r * 0.3, n.y - r * 0.3, 0, n.x, n.y, r);
                bodyGrad.addColorStop(0, n.color + 'cc');
                bodyGrad.addColorStop(1, n.color + '66');
                ctx.fillStyle = bodyGrad;
                ctx.shadowColor = n.color;
                ctx.shadowBlur = isHovered ? 25 : 12;
                ctx.beginPath();
                ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
                ctx.fill();

                // Inner highlight
                ctx.shadowBlur = 0;
                ctx.globalAlpha = isDimmed ? 0.1 : 0.15;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(n.x - r * 0.25, n.y - r * 0.25, r * 0.5, 0, Math.PI * 2);
                ctx.fill();

                // Initials
                ctx.globalAlpha = isDimmed ? 0.3 : 1;
                ctx.fillStyle = '#fff';
                ctx.font = `700 ${r * 0.65}px Inter`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const initials = n.name.split(' ').map(w => w[0]).join('');
                ctx.fillText(initials, n.x, n.y + 1);

                // Name label below
                ctx.font = '600 12px Inter';
                ctx.fillStyle = isDimmed ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.8)';
                ctx.fillText(n.name.split(' ')[0], n.x, n.y + r + 18);

                ctx.restore();
            });

            // Minimap
            drawMinimap();

            requestAnimationFrame(draw);
        }

        function isConnected(node, other) {
            return edges.some(e =>
                activeFilters.has(e.type) &&
                ((e.from === node.id && e.to === other.id) || (e.to === node.id && e.from === other.id))
            );
        }

        function drawMinimap() {
            mmCtx.clearRect(0, 0, 160, 120);
            const sx = 160 / W, sy = 120 / H;
            edges.forEach(e => {
                if (!activeFilters.has(e.type)) return;
                const a = nodeMap[e.from], b = nodeMap[e.to];
                mmCtx.strokeStyle = typeColors[e.type] + '40';
                mmCtx.lineWidth = 0.5;
                mmCtx.beginPath();
                mmCtx.moveTo(a.x * sx, a.y * sy);
                mmCtx.lineTo(b.x * sx, b.y * sy);
                mmCtx.stroke();
            });
            nodes.forEach(n => {
                mmCtx.fillStyle = n.color;
                mmCtx.beginPath();
                mmCtx.arc(n.x * sx, n.y * sy, 3, 0, Math.PI * 2);
                mmCtx.fill();
            });
        }

        /* ── INTERACTIONS ─────────────────────── */
        let dragNode = null;

        canvas.addEventListener('mousemove', e => {
            const mx = e.clientX, my = e.clientY;
            if (dragNode) {
                dragNode.x = mx; dragNode.y = my;
                dragNode.vx = 0; dragNode.vy = 0;
                return;
            }
            hoveredNode = null;
            for (let i = nodes.length - 1; i >= 0; i--) {
                const n = nodes[i];
                const dx = mx - n.x, dy = my - n.y;
                if (dx * dx + dy * dy < n.radius * n.radius * 1.5) {
                    hoveredNode = n;
                    canvas.style.cursor = 'pointer';
                    tooltip.style.left = mx + 'px';
                    tooltip.style.top = my + 'px';
                    tooltip.classList.add('visible');
                    document.getElementById('ttName').textContent = n.name;
                    document.getElementById('ttRole').textContent = n.role;
                    return;
                }
            }
            canvas.style.cursor = 'default';
            tooltip.classList.remove('visible');
        });

        canvas.addEventListener('mousedown', e => {
            if (hoveredNode) {
                dragNode = hoveredNode;
                dragNode.dragging = true;
                canvas.style.cursor = 'grabbing';
            }
        });

        addEventListener('mouseup', () => {
            if (dragNode) {
                dragNode.dragging = false;
                dragNode = null;
                canvas.style.cursor = hoveredNode ? 'pointer' : 'default';
            }
        });

        canvas.addEventListener('click', () => {
            if (hoveredNode && !dragNode) {
                selectedNode = hoveredNode;
                openPanel(hoveredNode);
            }
        });

        /* ── DETAIL PANEL ─────────────────────── */
        function openPanel(node) {
            const av = document.getElementById('detailAvatar');
            av.textContent = node.name.split(' ').map(w => w[0]).join('');
            av.style.background = `linear-gradient(135deg, ${node.color}cc, ${node.color}66)`;
            av.style.color = '#fff';
            document.getElementById('detailName').textContent = node.name;
            document.getElementById('detailRole').textContent = node.role;
            document.getElementById('detailDesc').textContent = node.desc;

            const relsEl = document.getElementById('detailRels');
            relsEl.innerHTML = '';
            edges.filter(e => e.from === node.id || e.to === node.id).forEach(e => {
                const otherId = e.from === node.id ? e.to : e.from;
                const other = nodeMap[otherId];
                const item = document.createElement('div');
                item.className = 'rel-item';
                item.innerHTML = `
      <span class="rel-dot" style="background:${typeColors[e.type]}"></span>
      <span class="rel-name">${other.name}</span>
      <span class="rel-type">${e.label}</span>
    `;
                item.addEventListener('click', () => {
                    selectedNode = other;
                    hoveredNode = other;
                    openPanel(other);
                });
                relsEl.appendChild(item);
            });

            panel.classList.add('open');
        }

        document.getElementById('detailClose').addEventListener('click', () => {
            panel.classList.remove('open');
            selectedNode = null;
        });

        /* ── SEARCH ──────────────────────────── */
        document.getElementById('searchInput').addEventListener('input', e => {
            const q = e.target.value.toLowerCase();
            if (!q) { hoveredNode = null; return; }
            const match = nodes.find(n => n.name.toLowerCase().includes(q));
            if (match) {
                hoveredNode = match;
                selectedNode = match;
                openPanel(match);
            }
        });

        /* ── GO ──────────────────────────────── */
        draw();
    </script>
</body>

</html>
